version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: kaloyan-trailarr_server_1
      APP_PORT: 7889
    
  server:
    image: nandyalu/trailarr:latest
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/config:/data/config
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    environment:
      - TZ=Europe/Sofia
    ports:
      - "7889:7889"
